    computed: {},
    methods: {
        // 打开弹窗
        openwindow(listcontent) {
            this.window = true
            this.windowimg = listcontent.image
            // 暂停滚动动画
            const box = document.querySelector('.scroll-box')
            if (box) {
                box.style.animationPlayState = 'paused'
            }
        },
        // 关闭弹窗
        closewindow() {
            this.window = false
        }
    }
})
